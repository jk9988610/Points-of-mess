  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; line-height: 1.6; color: #1f2937; max-width: 36rem; margin-inline: auto; }
    h1 { font-size: 1.35rem; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; }
    .ok { color: #047857; font-weight: 700; }
    .warn { color: #b45309; }
    a { color: #4f46e5; }
  </style>

<body>
  <h1>在 Pad 上怎么用？</h1>
  <p class="warn">如果你是从「文件」里打开的这个页面，对话功能<strong>无法使用</strong>。</p>
  <p><strong>安卓平板：</strong>请先安装 <strong>Termux</strong>，详见项目内 <code>安卓平板-看这里.md</code>。</p>
  <ol>
    <li>打开 <strong>Termux</strong>，进入项目文件夹，运行：<code>sh pad-start.sh</code></li>
    <li>用 <strong>Chrome</strong> 打开：<span class="ok"><a href="/">http://127.0.0.1:3000</a></span>（或终端里打印的地址）</li>
    <li>把该地址<strong>加到主屏幕</strong>，以后只点这一个入口</li>
  </ol>
  <p>很多文件（<code>js/</code>、<code>styles/</code>）不用逐个打开，服务会自动加载。</p>
  <p>详细说明见项目根目录 <code>打开我.md</code> 与 <code>docs/PAD-开发指南.md</code>。</p>
  <p><a href="/">→ 前往聊天页面</a></p>
</body>
