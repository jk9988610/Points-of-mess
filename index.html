<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AI 对话">
  <meta name="mobile-web-app-capable" content="yes">
  <title>AI 对话 · Points-of-mess</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="styles/chat.css">
</head>
<body>
  <main class="chat-app" aria-label="AI 对话应用">
    <header class="chat-header">
      <div>
        <h1 class="chat-title">AI 智能对话</h1>
        <p class="chat-subtitle">由 DeepSeek 驱动，支持流式回复与本地会话保存。</p>
      </div>
      <div class="header-actions">
        <button class="stop-button" type="button" id="stopGeneration" disabled>停止</button>
        <button class="clear-button" type="button" id="clearChat">清空</button>
      </div>
    </header>

    <div class="status-banner" id="statusBanner" role="status"></div>

    <section class="messages" id="messages" aria-live="polite"></section>

    <form class="composer" id="chatForm">
      <textarea
        id="messageInput"
        rows="1"
        autocomplete="off"
        placeholder="输入消息，Enter 发送，Shift+Enter 换行…"
        aria-label="消息输入"
      ></textarea>
      <button id="sendButton" type="submit" disabled>发送</button>
    </form>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
