<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Points-of-mess</title>
  <link rel="stylesheet" href="styles/map.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1 class="app-title">Points-of-mess</h1>
      <button class="stop-button" type="button" id="stopGeneration" disabled>停止</button>
    </header>

    <div class="map-stage" id="mapStage">
      <canvas id="gameCanvas" aria-label="宇宙地图"></canvas>
      <div class="speech-bubble" id="speechBubble" role="status" aria-live="polite">
        <p class="speech-bubble-text" id="speechBubbleText"></p>
      </div>
      <p class="map-hint" id="mapHint">点击空地移动 · 靠近角色后点击交谈</p>
    </div>

    <div class="config-setup" id="configSetup" hidden>
      <p><strong>需要配置 API 密钥</strong></p>
      <ol>
        <li>复制 <code>js/config.example.js</code> 为 <code>js/config.js</code></li>
        <li>在 <code>js/config.js</code> 里填入 DeepSeek <code>apiKey</code></li>
        <li>保存后刷新本页</li>
      </ol>
      <p class="config-setup-note">用 GitHub Pages 打开时仓库里没有该文件，请改用本地打开 <code>index.html</code>。</p>
    </div>

    <div class="status-banner" id="statusBanner" role="status"></div>

    <nav class="options-bar hidden" id="optionsBar" aria-label="对话选项">
      <button type="button" data-option-id="1">要点</button>
      <button type="button" data-option-id="2">追问</button>
      <button type="button" data-option-id="3">换题</button>
      <button type="button" data-option-id="4">收束</button>
    </nav>
  </div>

  <script src="js/config.js" onerror="window.__POM_CONFIG_MISSING__=true"></script>
  <script src="js/config-check.js"></script>
  <script src="js/presets.js"></script>
  <script src="js/dialogue.js"></script>
  <script src="js/state.js"></script>
  <script src="js/map.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
