<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Chat</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      --accent: #4f46e5;
      --accent-dark: #3730a3;
      --background: #eef2ff;
      --bubble-bot: #ffffff;
      --bubble-user: #4f46e5;
      --text-main: #1f2937;
      --text-muted: #6b7280;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #dbeafe 0%, #eef2ff 50%, #f5f3ff 100%);
      color: var(--text-main);
    }

    .chat-app {
      width: min(920px, calc(100vw - 32px));
      height: min(760px, calc(100vh - 32px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 24px 80px rgba(67, 56, 202, 0.2);
      backdrop-filter: blur(16px);
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 24px 28px;
      border-bottom: 1px solid #e5e7eb;
      background: rgba(255, 255, 255, 0.75);
    }

    .chat-title {
      margin: 0;
      font-size: clamp(1.4rem, 2vw, 2rem);
      letter-spacing: -0.04em;
    }

    .chat-subtitle {
      margin: 6px 0 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .clear-button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #f3f4f6;
      color: #374151;
      cursor: pointer;
      font-weight: 700;
      transition: background 160ms ease, transform 160ms ease;
    }

    .clear-button:hover {
      background: #e5e7eb;
      transform: translateY(-1px);
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 26px;
      overflow-y: auto;
      background:
        radial-gradient(circle at 15% 20%, rgba(79, 70, 229, 0.08), transparent 28%),
        radial-gradient(circle at 85% 0%, rgba(14, 165, 233, 0.08), transparent 26%),
        var(--background);
    }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 78%;
      animation: pop-in 180ms ease-out;
    }

    .message-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      flex: 0 0 34px;
      border-radius: 50%;
      background: #e0e7ff;
      color: var(--accent-dark);
      font-weight: 800;
      font-size: 0.82rem;
    }

    .message-row.user .avatar {
      background: var(--accent);
      color: #ffffff;
    }

    .bubble {
      padding: 13px 16px;
      border-radius: 18px 18px 18px 4px;
      background: var(--bubble-bot);
      line-height: 1.45;
      box-shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
      word-break: break-word;
    }

    .message-row.user .bubble {
      border-radius: 18px 18px 4px 18px;
      background: var(--bubble-user);
      color: #ffffff;
      box-shadow: 0 10px 30px rgba(79, 70, 229, 0.25);
    }

    .time {
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .message-row.user .time {
      color: rgba(255, 255, 255, 0.72);
    }

    .composer {
      display: flex;
      gap: 12px;
      padding: 18px;
      border-top: 1px solid #e5e7eb;
      background: rgba(255, 255, 255, 0.88);
    }

    .composer input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 14px 18px;
      font: inherit;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .composer input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.14);
    }

    .composer button {
      border: 0;
      border-radius: 999px;
      padding: 0 24px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font-weight: 800;
      transition: background 160ms ease, transform 160ms ease;
    }

    .composer button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .composer button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    @keyframes pop-in {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 640px) {
      .chat-app {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }

      .chat-header {
        align-items: flex-start;
        flex-direction: column;
        padding: 20px;
      }

      .message-row {
        max-width: 92%;
      }

      .composer {
        padding: 14px;
      }

      .composer button {
        padding: 0 18px;
      }
    }
  </style>
</head>
<body>
  <main class="chat-app" aria-label="Simple chat app">
    <header class="chat-header">
      <div>
        <h1 class="chat-title">Simple Chat</h1>
        <p class="chat-subtitle">Type a message and get a friendly demo reply.</p>
      </div>
      <button class="clear-button" type="button" id="clearChat">Clear chat</button>
    </header>

    <section class="messages" id="messages" aria-live="polite"></section>

    <form class="composer" id="chatForm">
      <input
        id="messageInput"
        type="text"
        autocomplete="off"
        placeholder="Write your message..."
        aria-label="Message"
      >
      <button id="sendButton" type="submit" disabled>Send</button>
    </form>
  </main>

  <script>
    const messagesEl = document.querySelector("#messages");
    const formEl = document.querySelector("#chatForm");
    const inputEl = document.querySelector("#messageInput");
    const sendButtonEl = document.querySelector("#sendButton");
    const clearButtonEl = document.querySelector("#clearChat");

    const starterMessages = [
      {
        sender: "bot",
        text: "Hi! I am a simple chat demo. Send me a message to begin."
      }
    ];

    const quickReplies = [
      "That sounds interesting. Tell me more.",
      "Thanks for sharing that with me.",
      "I am only a small demo bot, but I am listening.",
      "Nice! What would you like to talk about next?",
      "Got it. You can keep chatting or clear the conversation."
    ];

    const state = {
      messages: [...starterMessages]
    };

    function formatTime(date) {
      return date.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderMessages() {
      messagesEl.innerHTML = "";

      state.messages.forEach((message) => {
        const row = document.createElement("article");
        row.className = `message-row ${message.sender}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = message.sender === "user" ? "You" : "Bot";

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        const text = document.createElement("div");
        text.textContent = message.text;

        const time = document.createElement("div");
        time.className = "time";
        time.textContent = message.time || formatTime(new Date());

        bubble.append(text, time);
        row.append(avatar, bubble);
        messagesEl.appendChild(row);
      });

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(sender, text) {
      state.messages.push({
        sender,
        text,
        time: formatTime(new Date())
      });
      renderMessages();
    }

    function getBotReply(userText) {
      const lowerText = userText.toLowerCase();

      if (lowerText.includes("hello") || lowerText.includes("hi")) {
        return "Hello! Great to see you here.";
      }

      if (lowerText.includes("help")) {
        return "Try typing anything you like. This demo keeps the chat in your browser only.";
      }

      if (lowerText.includes("bye")) {
        return "Goodbye! Come back whenever you want to chat.";
      }

      return quickReplies[Math.floor(Math.random() * quickReplies.length)];
    }

    function setSendButtonState() {
      sendButtonEl.disabled = inputEl.value.trim().length === 0;
    }

    formEl.addEventListener("submit", (event) => {
      event.preventDefault();

      const text = inputEl.value.trim();
      if (!text) {
        return;
      }

      addMessage("user", text);
      inputEl.value = "";
      setSendButtonState();

      window.setTimeout(() => {
        addMessage("bot", getBotReply(text));
      }, 450);
    });

    inputEl.addEventListener("input", setSendButtonState);

    clearButtonEl.addEventListener("click", () => {
      state.messages = [...starterMessages];
      renderMessages();
      inputEl.focus();
    });

    renderMessages();
  </script>
</body>
</html>
