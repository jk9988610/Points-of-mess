<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>强制更新 Points-of-mess</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      padding: 24px;
      text-align: center;
      line-height: 1.6;
    }
    a { color: #818cf8; }
    code { color: #fde68a; }
    .ver { font-weight: 700; color: #86efac; }
  </style>
</head>
<body>
  <div>
    <p>正在拉取最新版 <span class="ver">v0.4.1</span>（绕过 Chrome 旧缓存）…</p>
    <p id="hint">若未自动跳转，请点：<a id="link" href="#">进入游戏</a></p>
    <p style="font-size:0.85rem;color:#94a3b8">与 Edge 不同，Chrome 可能长期缓存旧 <code>index.html</code>，请收藏本页以便日后更新。</p>
  </div>
  <script>
    (function () {
      var target = "index.html?fresh=" + Date.now() + "&from=refresh&v=0.3.6";
      var link = document.getElementById("link");
      link.href = target;
      try {
        sessionStorage.removeItem("pom_fresh_redirect");
        Object.keys(sessionStorage).forEach(function (k) {
          if (k.indexOf("pom_auto_refresh_") === 0) {
            sessionStorage.removeItem(k);
          }
        });
      } catch (e) {}
      location.replace(target);
    })();
  </script>
</body>
</html>
