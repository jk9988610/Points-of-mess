<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在刷新 Points-of-mess…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      padding: 24px;
      text-align: center;
      line-height: 1.6;
    }
    a { color: #818cf8; }
    code { color: #fde68a; }
  </style>
</head>
<body>
  <div>
    <p>正在跳转到最新版（绕过旧缓存）…</p>
    <p id="hint">若未自动跳转，请点：<a id="link" href="#">进入游戏</a></p>
  </div>
  <script>
    (function () {
      var target =
        "index.html?fresh=" + Date.now() + "&from=refresh";
      var link = document.getElementById("link");
      link.href = target;
      try {
        sessionStorage.removeItem("pom_fresh_redirect");
      } catch (e) {}
      location.replace(target);
    })();
  </script>
</body>
</html>
