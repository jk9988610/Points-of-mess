# 一键重发 Pages（workflow_dispatch）
# 用法：Settings → Pages → Source 选 **GitHub Actions** 后，在 Actions 里 Run 本 workflow
name: Republish Pages (official)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-republish
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            ./ _site/
          touch _site/.nojekyll
          echo "republish $(date -u +%Y-%m-%dT%H:%M:%SZ) $(git rev-parse --short HEAD)" > _site/DEPLOY.txt

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages CDN
        id: deployment
        uses: actions/deploy-pages@v4
