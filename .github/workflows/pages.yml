# 推送到 main 时同步到 gh-pages；Pages 源须为分支 gh-pages /(root)
# 见 docs/PAGES-SETUP.md
# 若 push 未触发本 workflow（如部分 bot/Agent 推送），请 Actions 手动 Run，或执行 scripts/sync-gh-pages.sh
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare static site (no .github)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            ./ _site/
          touch _site/.nojekyll
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) $(git rev-parse --short HEAD)" > _site/DEPLOY.txt

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: _site
          enable_jekyll: false
          force_orphan: true
